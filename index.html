<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ご来場受付</title>
<style>
  :root{
    --moss:#2f4538;--moss-light:#4a6b54;--bark:#6b5840;
    --cream:#f7f3ea;--ember:#c1622d;--line:#dcd5c4;--ink:#2b2b26;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;height:100%;font-family:"Hiragino Sans","Yu Gothic",-apple-system,BlinkMacSystemFont,sans-serif;background:var(--cream);color:var(--ink);overflow:hidden;-webkit-tap-highlight-color:transparent;user-select:none;}
  #app{position:relative;height:100%;width:100%;display:flex;flex-direction:column;}
  .loading{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;}
  .loading .spinner{width:48px;height:48px;border:4px solid var(--line);border-top-color:var(--ember);border-radius:50%;animation:spin .8s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg);}}
  .loading p{color:#8a8369;font-size:15px;}
  header{padding:18px 28px 14px;background:var(--cream);border-bottom:1px solid var(--line);flex-shrink:0;}
  .brand{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:12px;}
  .brand h1{font-size:20px;margin:0;letter-spacing:.05em;color:var(--moss);font-weight:700;}
  .brand .sub{font-size:12px;color:#8a8369;letter-spacing:.1em;}
  .progress-track{display:flex;gap:6px;}
  .progress-seg{flex:1;height:6px;border-radius:4px;background:var(--line);overflow:hidden;position:relative;}
  .progress-seg .fill{position:absolute;inset:0;background:var(--ember);transform:translateX(-100%);transition:transform .45s cubic-bezier(.4,0,.2,1);}
  .progress-seg.done .fill,.progress-seg.current .fill{transform:translateX(0);}
  .step-label{margin-top:8px;font-size:13px;color:#8a8369;}
  main{flex:1;position:relative;overflow:hidden;}
  .stage{position:absolute;inset:0;padding:20px 32px 24px;display:flex;flex-direction:column;transform:translateX(40px);opacity:0;transition:transform .38s cubic-bezier(.22,1,.36,1),opacity .3s ease;pointer-events:none;overflow-y:auto;}
  .stage.active{transform:translateX(0);opacity:1;pointer-events:auto;}
  .q-title{font-size:26px;font-weight:700;color:var(--moss);margin:6px 0 4px;}
  .q-hint{font-size:14px;color:#8a8369;margin:0 0 22px;}
  .field-grid{display:flex;flex-direction:column;gap:18px;max-width:640px;}
  label.field-label{font-size:14px;color:var(--bark);font-weight:600;margin-bottom:6px;display:block;}
  input[type=text],input[type=tel]{width:100%;font-size:22px;padding:16px 18px;border:2px solid var(--line);border-radius:12px;background:#fff;color:var(--ink);outline:none;transition:border-color .2s;font-family:inherit;}
  input[type=text]:focus,input[type=tel]:focus{border-color:var(--ember);}
  .top-wrap{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;gap:18px;}
  .top-wrap .top-ico{font-size:64px;}
  .top-wrap h2{font-size:30px;color:var(--moss);margin:0;}
  .top-wrap p{color:#8a8369;font-size:15px;max-width:480px;line-height:1.7;margin:0;}
  .top-start-btn{margin-top:10px;font-size:20px;font-weight:700;padding:20px 52px;border-radius:16px;border:none;background:var(--ember);color:#fff;cursor:pointer;}
  .top-start-btn:active{transform:scale(.97);}
  .card-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;max-width:900px;}
  .card-grid.cols-2{grid-template-columns:repeat(2,1fr);}
  .card-grid.cols-2-sm{grid-template-columns:repeat(2,1fr);max-width:520px;}
  .opt-card{border:2px solid var(--line);background:#fff;border-radius:16px;padding:22px 14px;text-align:center;cursor:pointer;transition:border-color .15s,transform .1s,background .15s;display:flex;flex-direction:column;align-items:center;gap:8px;min-height:130px;justify-content:center;position:relative;}
  .opt-card .ico{font-size:34px;line-height:1;}
  .opt-card .label{font-size:17px;font-weight:700;color:var(--ink);}
  .opt-card .desc{font-size:12px;color:#8a8369;}
  .opt-card .price{font-size:12px;color:var(--ember);font-weight:700;}
  .opt-card:active{transform:scale(.97);}
  .opt-card.selected{border-color:var(--ember);background:#fdf1e9;}
  .opt-card.selected .label{color:var(--ember);}
  /* 複数選択用チェックマーク */
  .opt-card .check-badge{
    display:none;position:absolute;top:10px;right:10px;
    width:24px;height:24px;border-radius:50%;
    background:var(--ember);color:#fff;font-size:14px;
    align-items:center;justify-content:center;font-weight:700;
  }
  .opt-card.selected .check-badge{display:flex;}
  .stepper-list{display:flex;flex-direction:column;gap:16px;max-width:520px;}
  .stepper-row{display:flex;align-items:center;justify-content:space-between;background:#fff;border:2px solid var(--line);border-radius:14px;padding:16px 20px;}
  .stepper-row .meta .label{font-size:18px;font-weight:700;}
  .stepper-row .meta .sub{font-size:12px;color:#8a8369;}
  .stepper-ctrl{display:flex;align-items:center;gap:18px;}
  .stepper-btn{width:46px;height:46px;border-radius:50%;border:2px solid var(--moss);background:var(--cream);color:var(--moss);font-size:24px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:background .15s;}
  .stepper-btn:active{background:var(--moss-light);color:#fff;}
  .stepper-val{font-size:26px;font-weight:700;min-width:40px;text-align:center;}
  footer{flex-shrink:0;padding:16px 32px 22px;display:flex;justify-content:space-between;align-items:center;border-top:1px solid var(--line);background:var(--cream);}
  .btn{font-size:17px;font-weight:700;padding:15px 30px;border-radius:12px;border:none;cursor:pointer;transition:opacity .15s,transform .1s;}
  .btn:active{transform:scale(.97);}
  .btn-primary{background:var(--ember);color:#fff;}
  .btn-primary:disabled{background:#d9c9b8;cursor:not-allowed;}
  .btn-ghost{background:transparent;color:var(--bark);border:2px solid var(--line);}
  .btn-ghost:disabled{opacity:0;pointer-events:none;}
  .confirm-list{border:1px solid var(--line);border-radius:14px;overflow:hidden;max-width:640px;background:#fff;}
  .confirm-row{display:flex;padding:14px 18px;border-bottom:1px solid var(--line);font-size:15px;}
  .confirm-row:last-child{border-bottom:none;}
  .confirm-row .k{width:150px;color:#8a8369;flex-shrink:0;}
  .confirm-row .v{font-weight:700;color:var(--ink);}
  .price-box{margin-top:18px;max-width:640px;background:#fff;border:2px solid var(--ember);border-radius:14px;overflow:hidden;}
  .price-box .price-head{background:var(--ember);color:#fff;padding:10px 18px;font-size:14px;font-weight:700;}
  .price-row{display:flex;justify-content:space-between;padding:10px 18px;font-size:14px;border-bottom:1px solid var(--line);}
  .price-row .pname{color:#5c5848;}
  .price-row .pval{font-weight:700;}
  .price-row.total{background:#fdf1e9;font-size:18px;}
  .price-row.total .pname,.price-row.total .pval{color:var(--ember);font-weight:800;}
  .price-note{font-size:11px;color:#a39d86;padding:8px 18px 12px;}
  .thanks{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;gap:10px;}
  .thanks .big{font-size:54px;}
  .thanks h2{font-size:28px;color:var(--moss);margin:6px 0;}
  .thanks p{color:#8a8369;font-size:15px;}
  .reset-bar{margin-top:24px;font-size:13px;color:#b5ad94;}
  /* 施設ステップの「選択中バッジ」 */
  .facility-selected-bar{
    margin-bottom:14px;padding:10px 16px;
    background:#fdf1e9;border:1px solid var(--ember);border-radius:10px;
    font-size:13px;color:var(--ember);font-weight:700;max-width:900px;
  }
</style>
</head>
<body>
<div id="app"></div>
<script>
// ========================================================
//  GAS URL
// ========================================================
const GAS_URL = "https://script.google.com/macros/s/AKfycbxn761azY4h4wPdkfKPelsmiN8K2mxoOe76CmE5CRYU2Hu3Zkc0mPUneUTSqkPzGUza/exec";

// ========================================================
//  施設定義
// ========================================================
const FACILITIES = [
  { id:'cottage',  label:'コテージ',     ico:'🏠', desc:'宿泊棟',    camp:false, priceType:'flat',       priceKey:'cottage' },
  { id:'bbq',      label:'バーベキュー', ico:'🍖', desc:'日帰り利用', camp:false, priceType:'flatPerUse', priceKey:'bbq' },
  { id:'autocamp', label:'オートキャンプ',ico:'🚐', desc:'車横付け',  camp:true,  priceType:'campAuto' },
  { id:'freecamp', label:'フリーキャンプ',ico:'⛺', desc:'区画自由',  camp:true,  priceType:'campFree',   priceKey:'freecamp' },
  { id:'meeting',  label:'会議室',       ico:'🗂️', desc:'研修・会議', camp:false, priceType:'flatPerUse', priceKey:'meeting' },
  { id:'kitchen',  label:'調理室',       ico:'🍳', desc:'調理利用',  camp:false, priceType:'flatPerUse', priceKey:'kitchen' },
];

const AUTOCAMP_SITES = [
  { id:'standard', label:'A・B・C・D区画', priceKey:'autocamp_std' },
  { id:'cheap',    label:'E・F区画',       priceKey:'autocamp_cheap' },
];

const CAMP_STAY_TYPES = [
  { id:'daytrip', label:'日帰り', ico:'☀️', desc:'当日のみ' },
  { id:'stay',    label:'宿　泊', ico:'🌙', desc:'1泊以上' },
];

const RESERVATION_METHODS = [
  { id:'web',   label:'ネット予約', ico:'💻' },
  { id:'phone', label:'電話予約',   ico:'☎️' },
];

const PAYMENT_METHODS = {
  web: [
    { id:'onsite_cash', label:'現地で現金払い',     ico:'💴' },
    { id:'onsite_card', label:'現地でカード払い',   ico:'💳' },
  ],
  phone: [
    { id:'onsite_cash', label:'現地で現金払い',     ico:'💴' },
    { id:'paypay',      label:'PayPay',             ico:'📱' },
    { id:'web_paid',    label:'ネットで決済済み',   ico:'✅' },
  ],
};

// ========================================================
//  状態
// ========================================================
let prices = {};

let state = {
  name:'', address:'', phone:'',
  adults:1, children:0, infants:0,
  facilities:[],           // ← 複数選択に変更（配列）
  campStayType:'',
  campCarNumber:'', campTent:'', campPet:'', campFire:'',
  autocampSite:'standard',
  nights:1,
  reservation:'',
  payment:'',
};

// ========================================================
//  ヘルパー：選択中の施設オブジェクト一覧
// ========================================================
function selectedFacilities(){
  return state.facilities.map(id => FACILITIES.find(f => f.id === id)).filter(Boolean);
}

// キャンプ系施設が含まれているか
function hasCampFacility(){
  return selectedFacilities().some(f => f.camp);
}

// ========================================================
//  ステップ構築
// ========================================================
function buildSteps(){
  const steps = ['top','customer','people','facility'];
  if(hasCampFacility()){
    steps.push('campStayType');
    steps.push('campDetail');
    if(state.campStayType !== 'daytrip') steps.push('nights');
  } else {
    steps.push('nights');
  }
  steps.push('reservation','payment','confirm');
  return steps;
}

let stepIndex = 0;

// ========================================================
//  起動
// ========================================================
async function init(){
  showLoading();
  try{
    const res = await fetch(GAS_URL, { method:'GET', mode:'cors' });
    const json = await res.json();
    if(json.ok && json.prices) prices = json.prices;
  }catch(e){
    console.warn('料金マスタの取得に失敗しました。', e);
  }
  stepIndex = 0;
  render();
}

function showLoading(){
  document.getElementById('app').innerHTML = `
    <div class="loading">
      <div class="spinner"></div>
      <p>起動中です…</p>
    </div>`;
}

// ========================================================
//  料金計算（複数施設対応）
// ========================================================
function calcPrice(){
  const fList = selectedFacilities();
  if(fList.length === 0) return { lines:[], total:0 };

  const lines = [];
  let total = 0;
  const isDay = state.campStayType === 'daytrip';
  const nights = (hasCampFacility() && isDay) ? 1 : Math.max(state.nights, 1);
  const nightLabel = (hasCampFacility() && isDay) ? '（日帰り）' : `× ${nights}泊`;

  const get = key => prices[key] ?? null;
  const fmt = n => n !== null ? '¥' + Number(n).toLocaleString('ja-JP') : '—';

  const addLine = (name, fee, count=1) => {
    const val = fee !== null ? fee * count : null;
    lines.push({ name, display: fmt(val) });
    if(val !== null) total += val;
  };

  for(const f of fList){
    if(f.priceType === 'flat'){
      const fee = get(f.priceKey);
      addLine(`${f.label}（1棟）${nightLabel}`, fee !== null ? fee : null, fee !== null ? nights : 1);

    } else if(f.priceType === 'flatPerUse'){
      addLine(`${f.label} 利用料`, get(f.priceKey));

    } else if(f.priceType === 'campAuto'){
      const siteOpt = AUTOCAMP_SITES.find(o=>o.id===state.autocampSite) || AUTOCAMP_SITES[0];
      const siteFee = get(siteOpt.priceKey);
      addLine(`区画利用料（${siteOpt.label}）${nightLabel}`, siteFee !== null ? siteFee : null, siteFee !== null ? nights : 1);
      if(state.adults > 0) addLine(`共同施設利用料・大人 ${state.adults}名 ${nightLabel}`, get('camp_adult') !== null ? get('camp_adult') * state.adults : null, nights);
      if(state.children > 0) addLine(`共同施設利用料・小学生 ${state.children}名 ${nightLabel}`, get('camp_child') !== null ? get('camp_child') * state.children : null, nights);
      if(state.infants > 0) lines.push({ name:`幼児（小学生未満） ${state.infants}名`, display:'¥0' });

    } else if(f.priceType === 'campFree'){
      const fee = get(f.priceKey);
      addLine(`区画利用料${nightLabel}`, fee !== null ? fee : null, fee !== null ? nights : 1);
      if(state.adults > 0) addLine(`共同施設利用料・大人 ${state.adults}名 ${nightLabel}`, get('camp_adult') !== null ? get('camp_adult') * state.adults : null, nights);
      if(state.children > 0) addLine(`共同施設利用料・小学生 ${state.children}名 ${nightLabel}`, get('camp_child') !== null ? get('camp_child') * state.children : null, nights);
      if(state.infants > 0) lines.push({ name:`幼児（小学生未満） ${state.infants}名`, display:'¥0' });
    }
  }

  return { lines, total };
}

function yenFmt(n){ return '¥' + Number(n).toLocaleString('ja-JP'); }

function facilityPriceNote(f){
  const get = key => prices[key];
  if(f.priceType==='flat'){ const v=get(f.priceKey); return v!=null?`1棟 ${yenFmt(v)}/泊`:'料金は係員にご確認ください'; }
  if(f.priceType==='flatPerUse'){ const v=get(f.priceKey); return v!=null?`利用料 ${yenFmt(v)}`:'料金は係員にご確認ください'; }
  if(f.priceType==='campAuto'){ const s=get('autocamp_std'),c=get('autocamp_cheap'); return (s!=null&&c!=null)?`${yenFmt(c)}〜${yenFmt(s)}/区画＋施設利用料`:'料金は係員にご確認ください'; }
  if(f.priceType==='campFree'){ const v=get(f.priceKey); return v!=null?`${yenFmt(v)}/泊＋施設利用料`:'料金は係員にご確認ください'; }
  return '';
}

// ========================================================
//  描画
// ========================================================
function render(){
  const steps = buildSteps();
  if(stepIndex > steps.length-1) stepIndex = steps.length-1;
  const key = steps[stepIndex];
  const isTop = key === 'top';
  const displaySteps = steps.filter(s=>s!=='top');

  document.getElementById('app').innerHTML = `
    <header style="${isTop?'display:none':''}">
      <div class="brand">
        <h1>ご来場受付</h1>
        <div class="sub">STEP ${stepIndex} / ${displaySteps.length}</div>
      </div>
      <div class="progress-track">
        ${displaySteps.map((s,i)=>{
          const ri = steps.indexOf(s);
          return `<div class="progress-seg ${ri<stepIndex?'done':''} ${ri===stepIndex?'current':''}"><div class="fill"></div></div>`;
        }).join('')}
      </div>
      <div class="step-label">${stepLabel(key)}</div>
    </header>
    <main><div class="stage active" id="stage">${renderStage(key)}</div></main>
    <footer style="${isTop?'display:none':''}">
      <button class="btn btn-ghost" ${stepIndex===0?'disabled':''} onclick="goBack()">戻る</button>
      <button class="btn btn-primary" id="nextBtn" onclick="goNext()">${key==='confirm'?'この内容で受付する':'次へ'}</button>
    </footer>`;
  wireStage(key);
  updateNextEnabled(key);
}

function stepLabel(k){
  return ({customer:'お客様情報',people:'ご利用人数',facility:'ご利用施設',campStayType:'ご利用区分',campDetail:'キャンプのご利用詳細',nights:'宿泊数',reservation:'ご予約方法',payment:'お支払い方法',confirm:'内容のご確認'})[k]||'';
}

// ========================================================
//  各ページ
// ========================================================
function renderStage(key){
  switch(key){

    case 'top': return `
      <div class="top-wrap">
        <div class="top-ico">⛺🏠</div>
        <h2>ご来場ありがとうございます</h2>
        <p>こちらの端末でチェックインの受付を行います。<br>画面の案内に沿っていくつかの項目をご入力ください。</p>
        <button class="top-start-btn" onclick="startFlow()">受付をはじめる</button>
      </div>`;

    case 'customer': return `
      <div class="q-title">お客様情報をご入力ください</div>
      <div class="q-hint">代表者の方の情報をご入力ください</div>
      <div class="field-grid">
        <div>
          <label class="field-label">宿泊者名</label>
          <input type="text" id="in_name" placeholder="例：山田 太郎" value="${esc(state.name)}" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">
        </div>
        <div>
          <label class="field-label">ご住所</label>
          <input type="text" id="in_address" placeholder="例：長野県東筑摩郡生坂村〇〇" value="${esc(state.address)}" autocomplete="off" autocorrect="off" spellcheck="false">
        </div>
        <div>
          <label class="field-label">お電話番号</label>
          <input type="tel" id="in_phone" placeholder="例：090-1234-5678" value="${esc(state.phone)}">
        </div>
      </div>`;

    case 'people': return `
      <div class="q-title">ご利用人数を選んでください</div>
      <div class="q-hint">＋／－ボタンで人数を調整してください</div>
      <div class="stepper-list">
        ${sRow('adults','大人','中学生以上')}
        ${sRow('children','子供','小学生')}
        ${sRow('infants','幼児','未就学児')}
      </div>`;

    case 'facility':{
      const selectedLabels = selectedFacilities().map(f=>f.label);
      const bar = state.facilities.length > 0
        ? `<div class="facility-selected-bar">✅ 選択中：${selectedLabels.join('、')}（複数選択できます）</div>`
        : `<div class="facility-selected-bar" style="background:#f7f3ea;border-color:var(--line);color:#8a8369;">施設をタップして選んでください（複数選択できます）</div>`;
      return `
        <div class="q-title">ご利用の施設を選んでください</div>
        <div class="q-hint">複数の施設を同時にご利用の場合はすべて選んでください</div>
        ${bar}
        <div class="card-grid">
          ${FACILITIES.map(f=>{
            const sel = state.facilities.includes(f.id);
            return `
              <div class="opt-card ${sel?'selected':''}" data-val="${f.id}" data-group="facility">
                <div class="check-badge">✓</div>
                <div class="ico">${f.ico}</div>
                <div class="label">${f.label}</div>
                <div class="desc">${f.desc}</div>
                <div class="price">${facilityPriceNote(f)}</div>
              </div>`;
          }).join('')}
        </div>`;
    }

    case 'campStayType': return `
      <div class="q-title">日帰りですか？宿泊ですか？</div>
      <div class="q-hint">タップして選択してください</div>
      <div class="card-grid cols-2">
        ${CAMP_STAY_TYPES.map(t=>`
          <div class="opt-card ${state.campStayType===t.id?'selected':''}" data-val="${t.id}" data-group="campStayType">
            <div class="ico">${t.ico}</div>
            <div class="label">${t.label}</div>
            <div class="desc">${t.desc}</div>
          </div>`).join('')}
      </div>`;

    case 'campDetail':{
      const hasAuto = state.facilities.includes('autocamp');
      return `
      <div class="q-title">キャンプのご利用について</div>
      <div class="q-hint">分かる範囲でご入力ください（あとで係員が確認します）</div>
      <div class="field-grid">
        ${hasAuto?`
        <div>
          <label class="field-label">ご希望の区画</label>
          <div class="card-grid cols-2-sm">
            ${AUTOCAMP_SITES.map(o=>{
              const fee = prices[o.priceKey];
              return `<div class="opt-card ${state.autocampSite===o.id?'selected':''}" data-val="${o.id}" data-group="autocampSite">
                <div class="label">${o.label}</div>
                <div class="price">${fee!=null?yenFmt(fee)+'/区画/泊':'—'}</div>
              </div>`;
            }).join('')}
          </div>
        </div>`:''}
        <div>
          <label class="field-label">お車のナンバー</label>
          <input type="text" id="in_car" placeholder="例：松本 123 あ 12-34" value="${esc(state.campCarNumber)}" autocomplete="off">
        </div>
        <div>
          <label class="field-label">テント・タープのサイズ／数</label>
          <input type="text" id="in_tent" placeholder="例：テント1・タープ1" value="${esc(state.campTent)}" autocomplete="off">
        </div>
        <div>
          <label class="field-label">ペット同伴</label>
          <input type="text" id="in_pet" placeholder="例：犬1匹（小型犬）／なし" value="${esc(state.campPet)}" autocomplete="off">
        </div>
        <div>
          <label class="field-label">焚き火のご利用</label>
          <input type="text" id="in_fire" placeholder="例：あり／なし" value="${esc(state.campFire)}" autocomplete="off">
        </div>
      </div>`;
    }

    case 'nights': return `
      <div class="q-title">何泊されますか？</div>
      <div class="q-hint">日帰りの場合は0泊を選んでください</div>
      <div class="stepper-list">
        ${sRow('nights','宿泊数','泊',0)}
      </div>`;

    case 'reservation': return `
      <div class="q-title">ご予約方法を選んでください</div>
      <div class="card-grid cols-2">
        ${RESERVATION_METHODS.map(r=>`
          <div class="opt-card ${state.reservation===r.id?'selected':''}" data-val="${r.id}" data-group="reservation">
            <div class="ico">${r.ico}</div>
            <div class="label">${r.label}</div>
          </div>`).join('')}
      </div>`;

    case 'payment':{
      const list = PAYMENT_METHODS[state.reservation]||[];
      return `
      <div class="q-title">お支払い方法を選んでください</div>
      <div class="card-grid cols-2">
        ${list.map(p=>`
          <div class="opt-card ${state.payment===p.id?'selected':''}" data-val="${p.id}" data-group="payment">
            <div class="ico">${p.ico}</div>
            <div class="label">${p.label}</div>
          </div>`).join('')}
      </div>`;
    }

    case 'confirm':{
      const fList = selectedFacilities();
      const r = RESERVATION_METHODS.find(x=>x.id===state.reservation);
      const p = (PAYMENT_METHODS[state.reservation]||[]).find(x=>x.id===state.payment);
      const campStay = CAMP_STAY_TYPES.find(x=>x.id===state.campStayType);
      const rows = [
        ['宿泊者名', state.name||'—'],
        ['ご住所', state.address||'—'],
        ['お電話番号', state.phone||'—'],
        ['人数', `大人 ${state.adults}名 / 子供 ${state.children}名 / 幼児 ${state.infants}名`],
        ['ご利用施設', fList.length > 0 ? fList.map(f=>f.label).join('、') : '—'],
      ];
      if(hasCampFacility()){
        rows.push(['ご利用区分', campStay?campStay.label:'—']);
        if(state.facilities.includes('autocamp')){
          const s = AUTOCAMP_SITES.find(o=>o.id===state.autocampSite);
          rows.push(['ご希望の区画', s?s.label:'—']);
        }
        rows.push(['お車のナンバー',state.campCarNumber||'—'],['テント・タープ',state.campTent||'—'],['ペット同伴',state.campPet||'—'],['焚き火',state.campFire||'—']);
      }
      if(state.campStayType === 'daytrip'){
        rows.push(['宿泊数', '日帰り']);
      } else {
        rows.push(['宿泊数', `${state.nights}泊`]);
      }
      rows.push(['ご予約方法', r?r.label:'—'],['お支払い方法', p?p.label:'—']);

      const {lines, total} = calcPrice();
      return `
        <div class="q-title">この内容でよろしいですか？</div>
        <div class="q-hint">内容をご確認のうえ「この内容で受付する」を押してください</div>
        <div class="confirm-list">
          ${rows.map(([k,v])=>`<div class="confirm-row"><div class="k">${k}</div><div class="v">${esc(String(v))}</div></div>`).join('')}
        </div>
        <div class="price-box">
          <div class="price-head">ご利用料金（目安）</div>
          ${lines.map(l=>`<div class="price-row"><div class="pname">${esc(l.name)}</div><div class="pval">${l.display}</div></div>`).join('')}
          <div class="price-row total"><div class="pname">合計</div><div class="pval">${yenFmt(total)}</div></div>
          <div class="price-note">※表示金額は目安です。詳細は係員にご確認ください。</div>
        </div>`;
    }
  }
}

function sRow(key,label,sub,min=0){
  return `
    <div class="stepper-row">
      <div class="meta"><div class="label">${label}</div><div class="sub">${sub}</div></div>
      <div class="stepper-ctrl">
        <div class="stepper-btn" data-step="-1" data-key="${key}" data-min="${min}">−</div>
        <div class="stepper-val" id="val_${key}">${state[key]}</div>
        <div class="stepper-btn" data-step="1" data-key="${key}" data-min="${min}">＋</div>
      </div>
    </div>`;
}

function esc(s){
  return String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function startFlow(){ stepIndex=1; render(); }

function wireStage(key){
  document.querySelectorAll('#stage input[type=text],#stage input[type=tel]').forEach(el=>{
    el.addEventListener('input',e=>{
      const map={in_name:'name',in_address:'address',in_phone:'phone',in_car:'campCarNumber',in_tent:'campTent',in_pet:'campPet',in_fire:'campFire'};
      const k=map[e.target.id];
      if(k){state[k]=e.target.value;updateNextEnabled(key);}
    });
  });
  document.querySelectorAll('#stage .opt-card').forEach(el=>{
    el.addEventListener('click',()=>{
      const val=el.dataset.val, group=el.dataset.group;
      if(group==='facility'){
        // トグル：選択済みなら外す、未選択なら追加
        const idx = state.facilities.indexOf(val);
        if(idx >= 0){
          state.facilities.splice(idx, 1);
        } else {
          state.facilities.push(val);
        }
        // キャンプ系が外れたらcampStayTypeをリセット
        if(!hasCampFacility()) state.campStayType='';
        render();
      } else if(group==='campStayType'){
        state.campStayType=val; render();
      } else if(group==='autocampSite'){
        state.autocampSite=val; render();
      } else if(group==='reservation'){
        state.reservation=val;
        if(!(PAYMENT_METHODS[val]||[]).find(p=>p.id===state.payment)) state.payment='';
        render();
      } else if(group==='payment'){
        state.payment=val; render();
      }
    });
  });
  document.querySelectorAll('#stage .stepper-btn').forEach(el=>{
    el.addEventListener('click',()=>{
      const k=el.dataset.key, min=parseInt(el.dataset.min), d=parseInt(el.dataset.step);
      let v=state[k]+d;
      if(v<min)v=min; if(v>99)v=99;
      state[k]=v;
      const span=document.getElementById('val_'+k);
      if(span)span.textContent=v;
      updateNextEnabled(key);
    });
  });
}

function updateNextEnabled(key){
  const btn=document.getElementById('nextBtn');
  if(!btn)return;
  let ok=true;
  if(key==='customer') ok=state.name.trim().length>0&&state.address.trim().length>0;
  if(key==='facility') ok=state.facilities.length>0;
  if(key==='campStayType') ok=!!state.campStayType;
  if(key==='reservation') ok=!!state.reservation;
  if(key==='payment') ok=!!state.payment;
  btn.disabled=!ok;
}

function goBack(){ if(stepIndex===0)return; stepIndex--; render(); }

async function goNext(){
  const steps=buildSteps(), key=steps[stepIndex];
  if(key==='confirm'){await submitEntry();return;}
  if(stepIndex<steps.length-1){stepIndex++;render();}
}

async function submitEntry(){
  const btn=document.getElementById('nextBtn');
  btn.disabled=true; btn.textContent='送信中…';
  const fList=selectedFacilities();
  const r=RESERVATION_METHODS.find(x=>x.id===state.reservation);
  const p=(PAYMENT_METHODS[state.reservation]||[]).find(x=>x.id===state.payment);
  const campStay=CAMP_STAY_TYPES.find(x=>x.id===state.campStayType);
  const {total}=calcPrice();

  const entry={
    receivedAt:new Date().toISOString(),
    name:state.name, address:state.address, phone:state.phone,
    adults:state.adults, children:state.children, infants:state.infants,
    facility:fList.map(f=>f.label).join('、'),   // カンマ区切りで保存
    campStayType:campStay?campStay.label:'',
    campCarNumber:state.campCarNumber, campTent:state.campTent, campPet:state.campPet, campFire:state.campFire,
    nights: (hasCampFacility()&&state.campStayType==='daytrip') ? 0 : state.nights,
    reservation:r?r.label:'',
    payment:p?p.label:'',
    totalPrice:total,
  };

  try{
    await fetch(GAS_URL,{method:'POST',mode:'no-cors',headers:{'Content-Type':'text/plain;charset=utf-8'},body:JSON.stringify(entry)});
    showThanks();
  }catch(e){
    console.error(e);
    alert('保存中にエラーが発生しました。係員にお声がけください。\n詳細: '+e.message);
    btn.disabled=false; btn.textContent='この内容で受付する';
  }
}

function showThanks(){
  document.getElementById('app').innerHTML=`
    <div class="thanks">
      <div class="big">⛺✅</div>
      <h2>受付が完了しました</h2>
      <p>ありがとうございます。係員が確認のうえご案内いたします。</p>
      <div class="reset-bar" id="resetMsg">8秒後に最初の画面に戻ります</div>
      <button class="btn btn-primary" style="margin-top:18px" onclick="resetAll()">次のお客様の受付をする</button>
    </div>`;
  let sec=8;
  const timer=setInterval(()=>{
    sec--;
    const m=document.getElementById('resetMsg');
    if(m)m.textContent=`${sec}秒後に最初の画面に戻ります`;
    if(sec<=0){clearInterval(timer);resetAll();}
  },1000);
}

function resetAll(){
  state={name:'',address:'',phone:'',adults:1,children:0,infants:0,facilities:[],campStayType:'',campCarNumber:'',campTent:'',campPet:'',campFire:'',autocampSite:'standard',nights:1,reservation:'',payment:''};
  stepIndex=0;
  init();
}

init();
</script>
</body>
</html>
